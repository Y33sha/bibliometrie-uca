# =============================================================
# Docker Compose — mode développement
# Usage : docker compose up
# =============================================================

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bibliometrie}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      retries: 5

  # ---- Backend FastAPI (hot reload) ----
  backend:
    build:
      context: .
      dockerfile: interfaces/api/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/app
    ports:
      - "8003:8000"
    env_file: .env
    environment:
      # Override pour le réseau docker : le conteneur db est accessible via l'hôte "db"
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend SvelteKit (vite dev server) ----
  frontend:
    build:
      context: ./interfaces/frontend
    restart: unless-stopped
    working_dir: /repo/interfaces/frontend
    # Monte tout le repo (pas seulement le frontend) : la route /docs lit les
    # markdown de `docs/` via un glob Vite remontant à la racine du repo.
    #
    # Le conteneur tourne en root et écrirait ses dossiers générés sur le
    # disque hôte en root (via le bind mount `.:/repo`). Les volumes anonymes
    # ci-dessous gardent ces dossiers générés (dépendances installées, sorties
    # de build, assets recopiés par les scripts `predev`/`prebuild`) à
    # l'intérieur du conteneur, hors du bind mount, pour ne pas polluer l'arbre
    # hôte avec des fichiers root.
    volumes:
      - .:/repo
      - /repo/interfaces/frontend/node_modules
      - /repo/interfaces/frontend/.svelte-kit
      - /repo/interfaces/frontend/build
      - /repo/interfaces/frontend/static/docs-screenshots
    ports:
      - "5176:5173"
    environment:
      API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
