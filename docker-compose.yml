# =============================================================
# Docker Compose — mode développement
# Usage : docker compose up
# =============================================================

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bibliometrie}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/docker-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      retries: 5

  # ---- Backend FastAPI (hot reload) ----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/app
      # Remplace le settings.py local par la version Docker (env vars)
      - ./config/settings.docker.py:/app/config/settings.py:ro
    ports:
      - "8003:8000"
    env_file: .env
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend SvelteKit (vite dev server) ----
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules   # garde les node_modules du conteneur
    ports:
      - "5176:5173"
    environment:
      API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
