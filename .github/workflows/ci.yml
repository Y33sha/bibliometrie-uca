name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      # Valeurs bidon pour satisfaire la validation pydantic-settings — les tests ne touchent pas à l'auth
      ADMIN_HASH: ci-placeholder-not-used
      SESSION_SECRET: ci-placeholder-not-used

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Architecture contracts (import-linter)
        run: lint-imports

      - name: Type check (mypy)
        run: mypy .

      - name: Unit tests (sans BDD)
        run: python -m pytest tests/unit/ -v

      - name: Integration tests (avec BDD)
        run: python -m pytest tests/integration/ -v

      - name: Coverage (tous les tests, seuil via pyproject.toml)
        run: python -m pytest tests/ --cov --cov-report=term-missing

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: interfaces/frontend
        run: npm ci

      - name: Type check
        working-directory: interfaces/frontend
        run: npm run check

      - name: Build
        working-directory: interfaces/frontend
        run: npm run build
