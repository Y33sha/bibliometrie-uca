# ============================================================
# pre-commit : vérifications lancées avant chaque git commit.
# Les hooks constatent et refusent ; ils ne modifient aucun fichier. Un commit
# refusé se corrige à la main (ou via `ruff format` / `ruff check --fix` / `uv
# lock` lancés explicitement) puis se rejoue.
# Installation : `pre-commit install` (après `pip install ".[dev]"`)
# Lancement manuel sur tout le repo : `pre-commit run --all-files`
# ============================================================
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Lint : signale les erreurs sans les corriger.
      - id: ruff
        args: [--no-fix]
      # Format : vérifie le formatage sans reformater.
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Hooks locaux : outils installés dans l'env Python du projet.
  - repo: local
    hooks:
      # Vérifie les contrats d'architecture DDD (pyproject.toml).
      - id: lint-imports
        name: lint-imports (architecture DDD)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        types: [python]

      # Type check (config permissive dans pyproject.toml — à durcir progressivement).
      - id: mypy
        name: mypy (type check)
        entry: uv run mypy .
        language: system
        pass_filenames: false
        types: [python]

      # Lance uniquement les tests unitaires (sans BDD, ~1-2s).
      # Les tests d'intégration (avec BDD) sont lancés en CI, pas ici.
      - id: pytest-unit
        name: pytest (tests unitaires)
        entry: uv run pytest tests/unit/ -q
        language: system
        pass_filenames: false
        types: [python]

      # Vérifie que uv.lock est à jour avec pyproject.toml, sans le régénérer.
      # Si le lockfile est périmé, le commit échoue : lancer `uv lock` à la main.
      - id: uv-lock
        name: uv-lock (vérifie que le lockfile est à jour)
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

      # Type check du frontend (Svelte + TypeScript). Tourne uniquement
      # quand des fichiers frontend sont staged. `npm run check` invoque
      # svelte-check avec --threshold error : seules les vraies erreurs
      # bloquent, les warnings passent (cf. ~70 warnings tolérés actuels).
      - id: svelte-check
        name: svelte-check (types frontend)
        entry: bash -c 'cd interfaces/frontend && npm run check'
        language: system
        pass_filenames: false
        files: ^interfaces/frontend/.*\.(svelte|ts|js)$
