# ============================================================
# Vérifications git : deux étages.
#   - pre-commit : garde rapide et locale à chaque commit (lint, format sur
#     l'index, tests unitaires).
#   - pre-push   : rejoue les vérifications de la CI avant chaque push (lint,
#     format, types, contrats d'architecture, hygiène des dépendances, build
#     frontend). La suite de tests reste à la charge de la CI, trop longue pour
#     un pre-push.
# Installation des deux étages, par machine (`.git/hooks/` n'est pas versionné) :
# `pre-commit install`.
# Les hooks constatent et refusent ; ils ne modifient aucun fichier. Une
# vérification en échec se corrige à la main (ou via `ruff format` / `ruff check
# --fix` / `uv lock` lancés explicitement) puis se rejoue.
# Lancement manuel sur tout le repo : `pre-commit run --all-files`
#   (et `pre-commit run --all-files --hook-stage pre-push` pour l'étage push).
# ============================================================

# `pre-commit install` installe les deux étages : sans cette clé, il n'en pose
# qu'un, et le pre-push reste muet jusqu'à ce que quelqu'un pense au
# `--hook-type pre-push`.
default_install_hook_types: [pre-commit, pre-push]

# Les hooks sans `stages` explicite ne tournent qu'au commit ; l'étage pre-push
# est réservé aux hooks qui le déclarent.
default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Lint : signale les erreurs sans les corriger.
      - id: ruff
        args: [--no-fix]
      # Format : vérifie le formatage sans reformater.
      - id: ruff-format
        args: [--check]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # Hooks locaux : outils installés dans l'env Python du projet.
  # mypy et lint-imports résolvent les imports sur tout le projet : ils exigent
  # un arbre cohérent, que le commit d'un sous-ensemble de fichiers ne garantit
  # pas. Ils vivent donc à l'étage pre-push (arbre entièrement commité), pas ici.
  #
  # Les outils sont lancés par `python -m <module>`, pas par leur exécutable : le
  # contrôle d'application de Windows bloque les shims .exe non signés que uv pose
  # dans le venv (« os error 4551 »), binaire par binaire selon leur réputation.
  # L'interpréteur, lui, est signé. `lint-imports` fait exception : il n'expose pas
  # de point d'entrée module.
  - repo: local
    hooks:
      # Lance uniquement les tests unitaires (sans BDD, ~1-2s).
      # Les tests d'intégration (avec BDD) sont lancés en CI, pas ici.
      - id: pytest-unit
        name: pytest (tests unitaires)
        entry: uv run python -m pytest tests/unit/ -q
        language: system
        pass_filenames: false
        types: [python]

      # Vérifie que uv.lock est à jour avec pyproject.toml, sans le régénérer.
      # Si le lockfile est périmé, le commit échoue : lancer `uv lock` à la main.
      - id: uv-lock
        name: uv-lock (vérifie que le lockfile est à jour)
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$

      # --------------------------------------------------------
      # Étage pre-push : les contrôles de la CI (.github/workflows/ci.yml) qui
      # tiennent en quelques secondes et se passent d'une base. Tourne avant
      # chaque `git push`, sur tout le projet, quels que soient les fichiers
      # modifiés. Nécessite `pre-commit install --hook-type pre-push`.
      #
      # La suite d'intégration reste à la CI seule : elle demande une base et
      # dure plus d'une minute, ce qui pèserait sur chaque push.
      # --------------------------------------------------------

      # Hygiène des dépendances : imports non déclarés, dépendances inutilisées.
      - id: ci-deptry
        name: deptry (hygiène des dépendances)
        entry: uv run python -m deptry .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Scan de vulnérabilités des dépendances installées.
      - id: ci-pip-audit
        name: pip-audit (vulnérabilités)
        entry: uv run python -m pip_audit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Lint + format + contrats d'architecture + types sur tout le projet.
      # Rejoués ici même s'ils tournent au commit : garantit un push propre
      # y compris après un commit passé en --no-verify.
      - id: ci-ruff-check
        name: ruff check (lint)
        entry: uv run python -m ruff check .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ci-ruff-format
        name: ruff format --check (format)
        entry: uv run python -m ruff format --check .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ci-lint-imports
        name: lint-imports (architecture DDD)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ci-mypy
        name: mypy (type check)
        entry: uv run python -m mypy .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # Frontend : vulnérabilités, types, tests, puis build de production.
      # `--omit=dev` : seul `dependencies` part dans le bundle servi au
      # navigateur ; les failles de l'outillage de développement ne concernent
      # pas l'application déployée. Seuil `moderate` : c'est là que CVSS range
      # les XSS, qui sont la menace propre au code de navigateur.
      - id: ci-frontend-audit
        name: npm audit (vulnérabilités du bundle)
        entry: bash -c 'cd interfaces/frontend && npm audit --omit=dev --audit-level=moderate'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ci-frontend-check
        name: svelte-check (types frontend)
        entry: bash -c 'cd interfaces/frontend && npm run check'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ci-frontend-test
        name: vitest (tests frontend)
        entry: bash -c 'cd interfaces/frontend && npm test'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: ci-frontend-build
        name: build frontend (vite build)
        entry: bash -c 'cd interfaces/frontend && npm run build'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
