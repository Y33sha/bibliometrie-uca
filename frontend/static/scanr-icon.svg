<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="15.5" fill="#1a4d6e"/>
  <!-- noeud central excentré à droite -->
  <circle cx="19" cy="15" r="3.5" fill="white"/>
  <!-- 5 noeuds satellites -->
  <circle cx="8" cy="8" r="2.2" fill="white"/>
  <circle cx="6" cy="18" r="1.8" fill="white"/>
  <circle cx="12" cy="25" r="2" fill="white"/>
  <circle cx="25" cy="6" r="1.6" fill="white"/>
  <circle cx="26" cy="24" r="2.4" fill="white"/>
  <!-- liens en étoile depuis le noeud central -->
  <line x1="19" y1="15" x2="8" y2="8" stroke="white" stroke-width="1.1"/>
  <line x1="19" y1="15" x2="6" y2="18" stroke="white" stroke-width="1.1"/>
  <line x1="19" y1="15" x2="12" y2="25" stroke="white" stroke-width="1.1"/>
  <line x1="19" y1="15" x2="25" y2="6" stroke="white" stroke-width="1.1"/>
  <line x1="19" y1="15" x2="26" y2="24" stroke="white" stroke-width="1.1"/>
</svg>
