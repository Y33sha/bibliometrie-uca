<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="15.5" fill="#1a4d6e"/>
  <!-- noeud central excentré à droite -->
  <circle cx="19" cy="18" r="3" fill="white"/>
  <!-- 5 noeuds satellites -->
  <circle cx="8" cy="8" r="1.5" fill="white"/>
  <circle cx="10" cy="25" r="2" fill="white"/>
  <circle cx="20" cy="7" r="2" fill="white"/>
  
  <circle cx="29" cy="15" r="1.2" fill="white"/>
  <circle cx="26" cy="24" r="1.8" fill="white"/>
  <!-- liens en étoile depuis le noeud central -->
  <line x1="19" y1="18" x2="8" y2="8" stroke="white" stroke-width="0.5"/>
  <line x1="19" y1="18" x2="10" y2="25" stroke="white" stroke-width="0.5"/>
  <line x1="19" y1="18" x2="20" y2="7" stroke="white" stroke-width="0.5"/>
  <line x1="19" y1="18" x2="26" y2="24" stroke="white" stroke-width="0.5"/>
  <line x1="19" y1="18" x2="29" y2="15" stroke="white" stroke-width="0.5"/>
</svg>
