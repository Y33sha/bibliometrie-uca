<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnes — Bibliométrie UCA</title>
    <style>
        :root {
            --bg: #f8f7f4; --card: #ffffff; --border: #e2e0db;
            --text: #2c2c2c; --text-muted: #777;
            --accent: #3b6b9e; --accent-light: #e8f0f8;
            --success: #2a7d4f; --success-light: #e6f4ec;
            --danger: #c0392b; --danger-light: #fbeaea;
            --warning: #d4a017; --warning-light: #fef8e8;
        }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; font-size: 14px; line-height: 1.5; }
        .header { background: #2c3e50; color: white; padding: 12px 24px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* Stats */
        .stats-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 18px; text-align: center; flex: 1; min-width: 120px; }
        .stat-card .value { font-size: 22px; font-weight: 700; line-height: 1.2; }
        .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card.hl-success { border-left: 3px solid var(--success); }
        .stat-card.hl-warning { border-left: 3px solid var(--warning); }

        /* Toolbar */
        .toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .toolbar input, .toolbar select {
            padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
            font-size: 13px; background: white;
        }
        .toolbar input { width: 250px; }
        .toolbar select { max-width: 200px; }
        .toolbar .count { margin-left: auto; color: var(--text-muted); font-size: 12px; }

        /* Table */
        .data-table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .data-table th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 2px solid var(--border); background: #fafaf8; }
        .data-table td { padding: 7px 10px; font-size: 13px; border-bottom: 1px solid #f0efec; vertical-align: top; }
        .data-table tr:hover td { background: #fafaf8; }

        /* Tags */
        .tag { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 500; margin: 1px 2px; }
        .tag-linked { background: var(--success-light); color: var(--success); }
        .tag-unlinked { background: var(--warning-light); color: #8a6d10; }
        .tag-role { background: #eee; color: #555; }
        .tag-id { background: var(--accent-light); color: var(--accent); font-family: 'SF Mono', monospace; font-size: 10px; }

        /* Candidates panel */
        .candidates-row { background: #f5f7fa; }
        .candidates-row td { padding: 10px 20px; }
        .candidates-panel { font-size: 12px; }
        .candidates-panel h4 { margin: 0 0 8px; font-size: 13px; color: var(--accent); }
        .candidate-card {
            display: flex; align-items: center; gap: 10px;
            padding: 6px 10px; margin: 4px 0; background: white;
            border: 1px solid var(--border); border-radius: 4px;
        }
        .candidate-card .info { flex: 1; }
        .candidate-card .name { font-weight: 600; }
        .candidate-card .meta { color: var(--text-muted); font-size: 11px; }
        .btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: white; font-size: 12px; cursor: pointer; }
        .btn:hover { background: var(--accent-light); }
        .btn-link { border-color: var(--success); color: var(--success); }
        .btn-link:hover { background: var(--success); color: white; }
        .btn-unlink { border-color: var(--danger); color: var(--danger); font-size: 10px; }
        .btn-unlink:hover { background: var(--danger); color: white; }
        .btn-expand { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; color: var(--accent); }

        /* Linked author inline */
        .linked-author { display: inline-flex; align-items: center; gap: 4px; margin: 2px 4px; }

        /* Author detail sub-panel */
        .author-detail { margin-top: 6px; padding: 8px 10px; background: #f8f9fb; border: 1px solid #e8eaed; border-radius: 4px; font-size: 12px; }
        .author-detail h5 { margin: 0 0 4px; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.3px; }
        .sig-list { margin: 0 0 8px; padding: 0; list-style: none; }
        .sig-list li { padding: 2px 0; border-bottom: 1px solid #f0efec; display: flex; gap: 6px; align-items: baseline; }
        .sig-list li:last-child { border-bottom: none; }
        .sig-source { font-size: 10px; color: white; background: #8899aa; border-radius: 3px; padding: 0 4px; flex-shrink: 0; }
        .sig-text { word-break: break-word; color: #444; }
        .pub-list { margin: 0; padding: 0; list-style: none; }
        .pub-list li { padding: 3px 0; border-bottom: 1px solid #f0efec; }
        .pub-list li:last-child { border-bottom: none; }
        .pub-year { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-right: 4px; }
        .pub-title { color: #333; }
        .pub-uca { color: var(--success); font-size: 10px; font-weight: 600; }
        .btn-detail { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--accent); padding: 2px 4px; text-decoration: underline; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 4px; margin: 12px 0; }
        .pagination button { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: white; font-size: 12px; cursor: pointer; }
        .pagination button:hover { background: var(--accent-light); }
        .pagination button.active { background: var(--accent); color: white; border-color: var(--accent); }
        .pagination button:disabled { opacity: 0.4; cursor: default; }

        .empty { text-align: center; padding: 40px; color: var(--text-muted); }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); }
    </style>
    <script src="/static/admin/nav.js" defer></script>
</head>
<body>

<div class="header"></div>

<div class="container">
    <div class="stats-row" id="stats-row"></div>

    <div class="toolbar">
        <input type="text" id="search" placeholder="Rechercher (nom, email, département)…">
        <select id="filter-dept"><option value="">Tous départements</option></select>
        <select id="filter-role"><option value="">Tous rôles</option></select>
        <select id="filter-linked">
            <option value="">Tous</option>
            <option value="no">Non rattachées</option>
            <option value="yes">Rattachées</option>
        </select>
        <span class="count" id="result-count"></span>
    </div>

    <div id="table-container"></div>
    <div id="pagination" class="pagination"></div>
</div>

<script>
let currentPage = 1;
let searchTimeout = null;
let expandedPerson = null;

async function api(url, opts) {
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
}

function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

// ===== URL STATE =====
function updateUrlPage() {
    const url = new URL(window.location);
    if (currentPage > 1) url.searchParams.set('p', currentPage);
    else url.searchParams.delete('p');
    history.replaceState(null, '', url);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
    const urlP = new URLSearchParams(window.location.search).get('p');
    if (urlP) currentPage = Math.max(1, parseInt(urlP, 10) || 1);

    loadStats();
    loadFilters();
    loadTable();

    document.getElementById('search').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => { currentPage = 1; loadTable(); }, 400);
    });
    document.getElementById('filter-dept').addEventListener('change', () => { currentPage = 1; loadTable(); });
    document.getElementById('filter-role').addEventListener('change', () => { currentPage = 1; loadTable(); });
    document.getElementById('filter-linked').addEventListener('change', () => { currentPage = 1; loadTable(); });
});

// ===== STATS =====
async function loadStats() {
    const s = await api('/api/persons/stats');
    const pct = s.total_persons > 0 ? Math.round(100 * s.linked_persons / s.total_persons) : 0;
    document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
            <div class="value">${s.total_persons}</div>
            <div class="label">Personnes</div>
        </div>
        <div class="stat-card hl-success">
            <div class="value" style="color:var(--success)">${s.linked_persons}</div>
            <div class="label">Rattachées</div>
        </div>
        <div class="stat-card hl-warning">
            <div class="value" style="color:var(--warning)">${s.total_persons - s.linked_persons}</div>
            <div class="label">Non rattachées</div>
        </div>
        <div class="stat-card">
            <div class="value">${s.linked_authors}</div>
            <div class="label">Auteurs liés</div>
        </div>
        <div class="stat-card">
            <div class="value">${s.departments}</div>
            <div class="label">Départements</div>
        </div>
    `;
}

// ===== FILTERS =====
async function loadFilters() {
    const depts = await api('/api/persons/departments');
    const sel = document.getElementById('filter-dept');
    depts.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.department_name;
        opt.textContent = `${d.department_name} (${d.count})`;
        sel.appendChild(opt);
    });

    const roles = await api('/api/persons/roles');
    const selR = document.getElementById('filter-role');
    roles.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.role_title;
        opt.textContent = `${r.role_title} (${r.count})`;
        selR.appendChild(opt);
    });
}

// ===== TABLE =====
async function loadTable() {
    const params = new URLSearchParams({ page: currentPage, per_page: 50 });
    const search = document.getElementById('search').value;
    const dept = document.getElementById('filter-dept').value;
    const role = document.getElementById('filter-role').value;
    const linked = document.getElementById('filter-linked').value;
    if (search) params.set('search', search);
    if (dept) params.set('department', dept);
    if (role) params.set('role', role);
    if (linked) params.set('linked', linked);

    const data = await api('/api/persons?' + params);
    document.getElementById('result-count').textContent = data.total + ' personnes';

    const container = document.getElementById('table-container');
    if (!data.persons.length) {
        container.innerHTML = '<div class="empty">Aucune personne trouvée.</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    let html = '<table class="data-table"><thead><tr>'
        + '<th></th><th>Nom</th><th>Prénom</th><th>Département</th>'
        + '<th>Rôle</th><th>Période</th><th>Auteur(s) liés</th>'
        + '</tr></thead><tbody>';

    data.persons.forEach(p => {
        const linked = p.linked_authors || [];
        const linkedHtml = linked.length
            ? linked.map(a => {
                let ids = '';
                if (a.orcid) ids += `<span class="tag tag-id" title="ORCID">${esc(a.orcid)}</span>`;
                if (a.idhal) ids += `<span class="tag tag-id" title="idHAL">${esc(a.idhal)}</span>`;
                const srcTag = `<span class="tag tag-source" style="font-size:10px;background:#eee;color:#555">${esc(a.source)}</span>`;
                return `<span class="linked-author">
                    ${srcTag}<span class="tag tag-linked">${esc(a.full_name)}</span>${ids}
                    <button class="btn-unlink" onclick="unlinkAuthor(${p.id}, '${a.source}', ${a.id})" title="Détacher">×</button>
                </span>`;
            }).join('')
            : '<span class="tag tag-unlinked">non rattachée</span>';

        const period = [
            p.start_date ? p.start_date.substring(0, 10) : '',
            p.end_date ? p.end_date.substring(0, 10) : '…'
        ].filter(Boolean).join(' → ');

        html += `<tr>
            <td><button class="btn-expand" onclick="toggleCandidates(${p.id}, this)"
                title="Chercher des auteurs candidats">▶</button></td>
            <td><strong>${esc(p.last_name)}</strong></td>
            <td>${esc(p.first_name)}</td>
            <td>${esc(p.department_name || '')}</td>
            <td>${p.role_title ? '<span class="tag tag-role">' + esc(p.role_title) + '</span>' : ''}</td>
            <td style="font-size:12px;color:var(--text-muted)">${period}</td>
            <td>${linkedHtml}</td>
        </tr>`;
        html += `<tr class="candidates-row" id="cand-${p.id}" style="display:none"><td colspan="7"></td></tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
    renderPagination(data);
}

// ===== CANDIDATES =====
async function toggleCandidates(personId, btn) {
    const row = document.getElementById('cand-' + personId);
    if (row.style.display !== 'none') {
        row.style.display = 'none';
        btn.textContent = '▶';
        return;
    }
    btn.textContent = '▼';
    row.style.display = '';
    const cell = row.querySelector('td');
    cell.innerHTML = '<div class="loading">Recherche d\'auteurs candidats…</div>';

    const candidates = await api(`/api/persons/${personId}/candidates`);

    if (!candidates.length) {
        cell.innerHTML = '<div class="candidates-panel"><h4>Auteurs candidats</h4>'
            + '<div style="color:var(--text-muted)">Aucun auteur trouvé avec un nom similaire.</div></div>';
        return;
    }

    let html = '<div class="candidates-panel"><h4>Auteurs candidats (' + candidates.length + ')</h4>';
    candidates.forEach(c => {
        const already = c.person_id !== null;
        const ids = [];
        if (c.orcid) ids.push('ORCID: ' + c.orcid);
        if (c.idhal) ids.push('idHAL: ' + c.idhal);
        if (c.openalex_id) ids.push('OA: ' + c.openalex_id);
        const srcTag = '<span class="tag tag-source" style="font-size:10px;background:#eee;color:#555">' + esc(c.source) + '</span>';

        html += '<div class="candidate-card" style="flex-direction:column;align-items:stretch">'
            + '<div style="display:flex;align-items:center;gap:10px">'
            + '<div class="info">'
            + srcTag + ' <span class="name">' + esc(c.full_name) + '</span>'
            + (ids.length ? ' <span class="meta">' + ids.map(esc).join(' · ') + '</span>' : '')
            + '<div class="meta">' + c.pub_count + ' publis'
            + (c.uca_pub_count > 0 ? ' dont <strong>' + c.uca_pub_count + ' UCA</strong>' : '') + '</div>'
            + '</div>'
            + '<button class="btn-detail" onclick="toggleAuthorDetail(\'' + c.source + '\',' + c.id + ', this)">signatures & publis ▸</button>';
        if (already) {
            html += '<span class="tag tag-linked" style="font-size:10px">déjà lié (personne #' + c.person_id + ')</span>';
        } else {
            html += '<button class="btn btn-link" onclick="linkAuthor(' + personId + ',\'' + c.source + '\',' + c.id + ')">Rattacher</button>';
        }
        html += '</div>'
            + '<div class="author-detail" id="adet-' + c.source + '-' + c.id + '" style="display:none"></div>'
            + '</div>';
    });
    html += '</div>';
    cell.innerHTML = html;
}

// ===== AUTHOR DETAIL =====
async function toggleAuthorDetail(source, authorId, btn) {
    const panel = document.getElementById('adet-' + source + '-' + authorId);
    if (panel.style.display !== 'none') {
        panel.style.display = 'none';
        btn.textContent = 'signatures & publis ▸';
        return;
    }
    btn.textContent = 'signatures & publis ▾';
    panel.style.display = '';
    panel.innerHTML = '<span style="color:var(--text-muted)">Chargement…</span>';

    const data = await api('/api/authors/' + source + '/' + authorId + '/details');

    let html = '';

    // Publications
    if (data.publications.length) {
        html += '<h5>Publications récentes (' + data.publications.length + ')</h5><ul class="pub-list">';
        data.publications.forEach(p => {
            html += '<li>'
                + '<span class="pub-year">' + (p.pub_year || '?') + '</span>'
                + (p.is_uca ? '<span class="pub-uca">UCA</span> ' : '')
                + '<span class="pub-title">' + esc(p.title) + '</span>'
                + (p.doi ? ' <a href="https://doi.org/' + esc(p.doi) + '" target="_blank" style="font-size:10px;color:var(--accent)">DOI</a>' : '')
                + '</li>';
        });
        html += '</ul>';
    }

    panel.innerHTML = html;
}

// ===== LINK / UNLINK =====
async function linkAuthor(personId, source, authorId) {
    await api('/api/persons/' + personId + '/link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ author_id: authorId, source: source })
    });
    loadStats();
    await refreshPersonRow(personId);
}

async function unlinkAuthor(personId, source, authorId) {
    await api('/api/persons/' + personId + '/link/' + source + '/' + authorId, { method: 'DELETE' });
    loadStats();
    await refreshPersonRow(personId);
}

async function refreshPersonRow(personId) {
    // Fetch updated person data
    const data = await api('/api/persons/' + personId);
    const p = data;

    // Update the linked authors cell in the main row
    const rows = document.querySelectorAll('table.data-table tbody tr:not(.candidates-row)');
    for (const tr of rows) {
        const expandBtn = tr.querySelector('.btn-expand');
        if (!expandBtn) continue;
        const onclick = expandBtn.getAttribute('onclick');
        if (onclick && onclick.includes('(' + personId + ',')) {
            // Found the right row — update the last cell (linked authors)
            const cells = tr.querySelectorAll('td');
            const linkedCell = cells[cells.length - 1];
            const linked = p.linked_authors || [];
            linkedCell.innerHTML = linked.length
                ? linked.map(a => {
                    let ids = '';
                    if (a.orcid) ids += '<span class="tag tag-id" title="ORCID">' + esc(a.orcid) + '</span>';
                    if (a.idhal) ids += '<span class="tag tag-id" title="idHAL">' + esc(a.idhal) + '</span>';
                    const srcTag = '<span class="tag tag-source" style="font-size:10px;background:#eee;color:#555">' + esc(a.source) + '</span>';
                    return '<span class="linked-author">'
                        + srcTag + '<span class="tag tag-linked">' + esc(a.full_name) + '</span>' + ids
                        + '<button class="btn-unlink" onclick="unlinkAuthor(' + p.id + ',\'' + a.source + '\',' + a.id + ')" title="Détacher">×</button>'
                        + '</span>';
                }).join('')
                : '<span class="tag tag-unlinked">non rattachée</span>';

            // Also update the candidate's "Rattacher" button to show "déjà lié"
            const candRow = document.getElementById('cand-' + personId);
            if (candRow && candRow.style.display !== 'none') {
                candRow.querySelectorAll('.btn.btn-link').forEach(btn => {
                    const btnOnclick = btn.getAttribute('onclick');
                    if (btnOnclick) {
                        // Check if this candidate is now linked
                        linked.forEach(a => {
                            if (btnOnclick.includes("'" + a.source + "'," + a.id + ")")) {
                                btn.outerHTML = '<span class="tag tag-linked" style="font-size:10px">lié</span>';
                            }
                        });
                    }
                });
            }
            break;
        }
    }
}

// ===== PAGINATION =====
function renderPagination(data) {
    const container = document.getElementById('pagination');
    if (data.pages <= 1) { container.innerHTML = ''; return; }
    const cur = data.page;
    let html = '<button ' + (cur <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (cur-1) + ')">‹</button>';
    const s = Math.max(1, cur - 3), e = Math.min(data.pages, cur + 3);
    if (s > 1) html += '<button onclick="goPage(1)">1</button>';
    if (s > 2) html += '<button disabled>…</button>';
    for (let i = s; i <= e; i++)
        html += '<button class="' + (i === cur ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    if (e < data.pages - 1) html += '<button disabled>…</button>';
    if (e < data.pages) html += '<button onclick="goPage(' + data.pages + ')">' + data.pages + '</button>';
    html += '<button ' + (cur >= data.pages ? 'disabled' : '') + ' onclick="goPage(' + (cur+1) + ')">›</button>';
    html += ' <input type="number" min="1" max="' + data.pages + '" value="' + cur + '" '
        + 'style="width:50px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center" '
        + 'title="Aller à la page…" '
        + 'onchange="goPage(Math.max(1,Math.min(' + data.pages + ',parseInt(this.value)||1)))"'
        + 'onkeydown="if(event.key===\'Enter\'){this.blur();goPage(Math.max(1,Math.min(' + data.pages + ',parseInt(this.value)||1)))}">'
        + '<span style="font-size:11px;color:var(--text-muted)">/ ' + data.pages + '</span>';
    container.innerHTML = html;
}

function goPage(p) { currentPage = p; updateUrlPage(); loadTable(); window.scrollTo(0, 0); }
</script>

</body>
</html>
