<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revue des adresses — Bibliométrie UCA</title>
    <style>
        :root {
            --bg: #f8f7f4;
            --card: #ffffff;
            --border: #e2e0db;
            --text: #2c2c2c;
            --text-muted: #777;
            --accent: #3b6b9e;
            --accent-light: #e8f0f8;
            --danger: #c44;
            --danger-light: #fce8e8;
            --success: #2a7d4f;
            --success-light: #e6f5ed;
            --warning: #c68a19;
            --warning-light: #fef5e0;
            --highlight: #fff3b0;
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 16px; font-weight: 600; margin: 0; }
        .stats-bar { display: flex; gap: 16px; font-size: 12px; }
        .stat-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .stat-pending { background: var(--warning-light); color: var(--warning); }
        .stat-rejected { background: var(--danger-light); color: var(--danger); }
        .stat-confirmed { background: var(--success-light); color: var(--success); }

        .layout {
            height: calc(100vh - 48px);
        }

        .main-panel { overflow-y: auto; padding: 16px; max-width: 1400px; margin: 0 auto; }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toolbar input[type="text"],
        .toolbar select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            background: white;
        }
        .toolbar input[type="text"] { width: 250px; }
        .toolbar .count {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 12px;
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        #structure-filter {
            font-weight: 600;
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Address rows */
        .addr-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 6px;
            transition: border-color 0.15s;
        }
        .addr-card:hover { border-color: var(--accent); }
        .addr-card.reviewed-rejected { border-left: 3px solid var(--danger); }
        .addr-card.reviewed-confirmed { border-left: 3px solid var(--success); }

        .addr-header {
            padding: 8px 12px;
            cursor: pointer;
            display: grid;
            grid-template-columns: 28px 1fr auto;
            gap: 10px;
            align-items: start;
        }
        .addr-header:hover { background: #fafaf8; }

        .addr-text {
            font-size: 13px;
            word-break: break-word;
        }
        .addr-text .highlight {
            background: var(--highlight);
            padding: 0 2px;
            border-radius: 2px;
            font-weight: 500;
        }
        .addr-meta {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .lab-tag {
            display: inline-block;
            font-size: 11px;
            padding: 1px 7px;
            border-radius: 10px;
            background: var(--warning-light);
            color: var(--warning);
            font-weight: 500;
        }
        .pub-count-tag {
            display: inline-block;
            font-size: 11px;
            padding: 1px 7px;
            border-radius: 10px;
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 500;
        }

        .addr-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        /* Detail panel */
        .addr-detail {
            display: none;
            padding: 0 12px 12px 50px;
            border-top: 1px solid var(--border);
        }
        .addr-detail.open { display: block; }

        .detail-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 8px 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pub-row {
            padding: 5px 0;
            border-bottom: 1px solid #f0f0ee;
            font-size: 12px;
        }
        .pub-row:last-child { border-bottom: none; }
        .pub-title-link {
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
        }
        .pub-title-link:hover { color: var(--accent); }
        .pub-meta-inline {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .pub-meta-inline a {
            color: var(--accent);
            text-decoration: none;
            margin-left: 6px;
        }
        .pub-meta-inline a:hover { text-decoration: underline; }

        /* Buttons */
        .btn {
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { background: #f0f0f0; }
        .btn-reject { color: var(--danger); }
        .btn-reject:hover { background: var(--danger-light); border-color: var(--danger); }
        .btn-confirm { color: var(--success); }
        .btn-confirm:hover { background: var(--success-light); border-color: var(--success); }
        .btn-reset { color: #888; }
        .btn-reset:hover { background: #f0f0f0; border-color: #888; }

        /* Batch bar */
        .batch-bar {
            display: none;
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            margin-bottom: 10px;
            align-items: center;
            justify-content: space-between;
        }
        .batch-bar.visible { display: flex; }
        .batch-bar button {
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            font-size: 12px;
            cursor: pointer;
            margin-left: 6px;
        }
        .batch-bar button:hover { background: rgba(255,255,255,0.15); }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 16px;
        }
        .pagination button {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: white;
            font-size: 12px;
            cursor: pointer;
        }
        .pagination button:hover { background: var(--accent-light); }
        .pagination button.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .pagination button:disabled { opacity: 0.4; cursor: default; }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
    <script src="/static/admin/nav.js" defer></script>
</head>
<body>

<div class="header"></div>

<div class="layout">
    <div class="main-panel">
        <div class="toolbar">
            <select id="structure-filter"></select>
            <div class="toolbar-sep"></div>
            <label style="font-size:12px; display:flex; align-items:center; gap:4px; cursor:pointer;">
                <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)">
                Tout
            </label>
            <select id="search-mode" style="width:auto;">
                <option value="contains">contient</option>
                <option value="not_contains">ne contient pas</option>
            </select>
            <input type="text" id="search-input" placeholder="Rechercher dans les adresses…">
            <select id="status-filter">
                <option value="pending">À examiner</option>
                <option value="confirmed">Confirmés</option>
                <option value="rejected">Rejetés</option>
                <option value="all">Tous</option>
            </select>
            <span class="count" id="result-count"></span>
        </div>

        <div class="stats-bar" id="stats-bar" style="display:flex; gap:12px; margin-bottom:10px; font-size:12px;"></div>

        <div class="batch-bar" id="batch-bar">
            <span><span id="selected-count">0</span> sélectionnées</span>
            <div>
                <button onclick="batchReview(false)">✗ Rejeter</button>
                <button onclick="batchReview(true)">✓ Confirmer</button>
                <button onclick="batchReview(null)">↺ Reset</button>
                <button onclick="clearSelection()">Annuler</button>
            </div>
        </div>

        <div id="address-list">
            <div class="loading">Chargement…</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script>
let currentPage = 1;
let currentStatus = 'pending';
let currentSearch = '';
let currentSearchMode = 'contains';
let currentStructureId = null;  // résolu au chargement
let selectedIds = new Set();
let searchTimeout = null;

const TYPE_LABELS = {
    universite: 'Universités',
    onr: 'Organismes de recherche',
    chu: 'CHU',
    ecole: 'Écoles',
    labo: 'Laboratoires',
};
const ALLOWED_TYPES = Object.keys(TYPE_LABELS);

document.addEventListener('DOMContentLoaded', () => {
    loadStructures().then(() => {
        loadStats();
        loadAddresses();
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentSearch = e.target.value;
            currentPage = 1;
            loadAddresses();
        }, 400);
    });

    document.getElementById('search-mode').addEventListener('change', (e) => {
        currentSearchMode = e.target.value;
        if (currentSearch) { currentPage = 1; loadAddresses(); }
    });

    document.getElementById('status-filter').addEventListener('change', (e) => {
        currentStatus = e.target.value;
        currentPage = 1;
        loadAddresses();
    });

    document.getElementById('structure-filter').addEventListener('change', (e) => {
        currentStructureId = parseInt(e.target.value);
        currentPage = 1;
        loadStats();
        loadAddresses();
    });
});

// ----- API -----
async function api(url, options = {}) {
    const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
    });
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    return res.json();
}

// ----- Structures -----
async function loadStructures() {
    const all = await api('/api/structures');
    const sel = document.getElementById('structure-filter');

    // Grouper par type, filtrer les types non pertinents
    const grouped = {};
    let ucaId = null;
    for (const s of all) {
        if (!ALLOWED_TYPES.includes(s.type)) continue;
        if (s.code === 'uca') ucaId = s.id;
        if (!grouped[s.type]) grouped[s.type] = [];
        grouped[s.type].push(s);
    }

    // Construire les optgroups
    for (const type of ALLOWED_TYPES) {
        const structs = grouped[type];
        if (!structs || !structs.length) continue;
        const og = document.createElement('optgroup');
        og.label = TYPE_LABELS[type];
        for (const s of structs) {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.acronym || s.name;
            og.appendChild(opt);
        }
        sel.appendChild(og);
    }

    // Défaut = UCA
    if (ucaId) {
        sel.value = ucaId;
        currentStructureId = ucaId;
    } else if (sel.options.length) {
        currentStructureId = parseInt(sel.options[0].value);
    }
}

// ----- Stats -----
async function loadStats() {
    const params = new URLSearchParams();
    if (currentStructureId) params.set('structure_id', currentStructureId);
    const s = await api(`/api/stats?${params}`);
    document.getElementById('stats-bar').innerHTML = `
        <span class="stat-badge stat-pending">À examiner : ${s.pending}</span>
        <span class="stat-badge stat-rejected">Rejetés : ${s.rejected}</span>
        <span class="stat-badge stat-confirmed">Confirmés : ${s.confirmed}</span>
    `;
}

// ----- Addresses -----
async function loadAddresses() {
    const params = new URLSearchParams({
        page: currentPage,
        per_page: 200,
        status: currentStatus,
        search: currentSearch,
        search_mode: currentSearchMode,
    });
    if (currentStructureId) params.set('structure_id', currentStructureId);

    const data = await api(`/api/addresses?${params}`);
    renderAddresses(data);
}

function renderAddresses(data) {
    const container = document.getElementById('address-list');
    document.getElementById('result-count').textContent =
        `${data.total} adresse${data.total > 1 ? 's' : ''}`;
    document.getElementById('select-all').checked = false;

    if (!data.addresses.length) {
        container.innerHTML = '<div class="loading">Aucune adresse trouvée.</div>';
        renderPagination(data);
        return;
    }

    container.innerHTML = data.addresses.map(addr => {
        const sc = addr.is_confirmed === false ? 'reviewed-rejected' :
                   addr.is_confirmed === true ? 'reviewed-confirmed' : '';
        const checked = selectedIds.has(addr.id) ? 'checked' : '';

        return `
        <div class="addr-card ${sc}" id="addr-${addr.id}">
            <div class="addr-header" onclick="toggleDetail(${addr.id}, event)">
                <input type="checkbox" ${checked}
                       onclick="event.stopPropagation(); toggleSelect(${addr.id})" />
                <div>
                    <div class="addr-text">${esc(addr.raw_text)}</div>
                    <div class="addr-meta">
                        <span class="pub-count-tag">${addr.pub_count} publi${addr.pub_count > 1 ? 's' : ''}</span>
                        ${(addr.structures || []).map(s => `<span class="lab-tag">${esc(s.acronym || s.name)}</span>`).join(' ')}
                    </div>
                </div>
                <div class="addr-actions" onclick="event.stopPropagation()">
                    <button class="btn btn-reject" title="Rejeter le lien"
                            onclick="reviewAddr(${addr.id}, false)">✗</button>
                    <button class="btn btn-confirm" title="Confirmer le lien"
                            onclick="reviewAddr(${addr.id}, true)">✓</button>
                    <button class="btn btn-reset" title="Reset"
                            onclick="reviewAddr(${addr.id}, null)">↺</button>
                </div>
            </div>
            <div class="addr-detail" id="detail-${addr.id}"></div>
        </div>`;
    }).join('');

    renderPagination(data);
}

// ----- Detail / Publications -----
async function toggleDetail(addrId, event) {
    if (event.target.type === 'checkbox') return;

    const detail = document.getElementById(`detail-${addrId}`);
    if (detail.classList.contains('open')) {
        detail.classList.remove('open');
        return;
    }
    document.querySelectorAll('.addr-detail.open').forEach(el => el.classList.remove('open'));
    detail.innerHTML = '<div style="padding:8px;color:var(--text-muted);">Chargement…</div>';
    detail.classList.add('open');

    const data = await api(`/api/addresses/${addrId}/publications`);

    if (!data.publications.length) {
        detail.innerHTML = '<div style="padding:8px;color:var(--text-muted);">Aucune publication liée.</div>';
        return;
    }

    detail.innerHTML = `
        <div class="detail-title">Publications (${data.publications.length})</div>
        ${data.publications.map(p => `
            <div class="pub-row">
                <div class="pub-title-link">${esc(p.title || '(sans titre)')}</div>
                <div class="pub-meta-inline">
                    ${p.pub_year} · ${esc(p.doc_type || '')}
                    · ${esc(p.author_name || '')}
                    ${p.journal_title ? ` · ${esc(p.journal_title)}` : ''}
                    ${p.doi ? `<a href="https://doi.org/${encodeURIComponent(p.doi)}" target="_blank">DOI ↗</a>` : ''}
                    ${p.openalex_id ? `<a href="https://openalex.org/${encodeURIComponent(p.openalex_id)}" target="_blank">OpenAlex ↗</a>` : ''}
                </div>
            </div>
        `).join('')}
    `;
}

// ----- Review -----
async function reviewAddr(addrId, isConfirmed) {
    await api(`/api/addresses/${addrId}/review`, {
        method: 'POST',
        body: JSON.stringify({ structure_id: currentStructureId, is_confirmed: isConfirmed }),
    });
    loadStats();
    loadAddresses();
}

async function batchReview(isConfirmed) {
    const ids = Array.from(selectedIds);
    await api('/api/addresses/batch-review', {
        method: 'POST',
        body: JSON.stringify({ address_ids: ids, structure_id: currentStructureId, is_confirmed: isConfirmed }),
    });
    selectedIds.clear();
    updateBatchBar();
    loadStats();
    loadAddresses();
}

// ----- Selection -----
function toggleSelectAll(checked) {
    document.querySelectorAll('.addr-card input[type=checkbox]').forEach(cb => {
        const addrId = parseInt(cb.closest('.addr-card').id.replace('addr-', ''));
        cb.checked = checked;
        if (checked) selectedIds.add(addrId);
        else selectedIds.delete(addrId);
    });
    updateBatchBar();
}

function toggleSelect(addrId) {
    if (selectedIds.has(addrId)) selectedIds.delete(addrId);
    else selectedIds.add(addrId);
    updateBatchBar();
}

function updateBatchBar() {
    const bar = document.getElementById('batch-bar');
    document.getElementById('selected-count').textContent = selectedIds.size;
    bar.classList.toggle('visible', selectedIds.size > 0);
}

function clearSelection() {
    selectedIds.clear();
    document.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
    updateBatchBar();
}

// ----- Pagination -----
function renderPagination(data) {
    const c = document.getElementById('pagination');
    if (data.pages <= 1) { c.innerHTML = ''; return; }
    let h = `<button ${currentPage<=1?'disabled':''} onclick="goToPage(${currentPage-1})">‹</button>`;
    const s = Math.max(1, currentPage-3), e = Math.min(data.pages, currentPage+3);
    if (s > 1) h += `<button onclick="goToPage(1)">1</button>`;
    if (s > 2) h += `<button disabled>…</button>`;
    for (let i = s; i <= e; i++)
        h += `<button class="${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
    if (e < data.pages-1) h += `<button disabled>…</button>`;
    if (e < data.pages) h += `<button onclick="goToPage(${data.pages})">${data.pages}</button>`;
    h += `<button ${currentPage>=data.pages?'disabled':''} onclick="goToPage(${currentPage+1})">›</button>`;
    c.innerHTML = h;
}

function goToPage(p) {
    currentPage = p;
    loadAddresses();
    document.querySelector('.main-panel').scrollTo(0, 0);
}

function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>

</body>
</html>
