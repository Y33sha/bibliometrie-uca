<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoires — Bibliométrie UCA</title>
    <style>
        :root {
            --bg: #f8f7f4;
            --card: #ffffff;
            --border: #e2e0db;
            --text: #2c2c2c;
            --text-muted: #777;
            --accent: #3b6b9e;
            --accent-light: #e8f0f8;
        }

        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 12px 24px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 16px 24px; }

        h2 {
            font-size: 17px;
            font-weight: 600;
            margin: 0 0 14px;
        }
        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: -10px 0 16px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .toolbar input[type="text"] {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            width: 260px;
        }
        .toolbar .count {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        thead th {
            background: #f5f4f1;
            padding: 9px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        thead th:hover { color: var(--text); }
        thead th .sort-arrow { font-size: 10px; margin-left: 3px; color: #bbb; }
        thead th.sorted .sort-arrow { color: var(--accent); }
        tbody tr { border-bottom: 1px solid #f0efec; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #fafaf8; }
        td {
            padding: 10px 12px;
            font-size: 13px;
            vertical-align: middle;
        }
        td a {
            color: var(--accent);
            text-decoration: none;
        }
        td a:hover { text-decoration: underline; }

        .lab-name { font-weight: 500; }
        .lab-acronym {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 6px;
        }
        .tutelles {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tutelle-tag {
            display: inline-block;
            padding: 2px 7px;
            background: #f0efec;
            border-radius: 3px;
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .id-badge {
            display: inline-block;
            padding: 2px 7px;
            background: #e8f0f8;
            border-radius: 3px;
            font-size: 11px;
            color: var(--accent);
            text-decoration: none;
            white-space: nowrap;
        }
        .id-badge:hover { background: #d4e4f3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header"></div>
    <div class="container">
        <h2>Laboratoires UCA</h2>
        <p class="subtitle">Structures de recherche ayant l'Universit&eacute; Clermont Auvergne pour tutelle</p>

        <div class="toolbar">
            <input type="text" id="search" placeholder="Rechercher un laboratoire...">
            <span class="count" id="count"></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th data-col="name">Laboratoire <span class="sort-arrow">&#9650;</span></th>
                    <th data-col="tutelles">Co-tutelles</th>
                    <th>ROR</th>
                    <th>Collection HAL</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script src="/static/nav.js" defer></script>
    <script>
    (function() {
        let labs = [];
        let sortCol = 'name';
        let sortAsc = true;

        const tbody = document.getElementById('tbody');
        const countEl = document.getElementById('count');
        const searchEl = document.getElementById('search');

        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function rorShortId(rorId) {
            if (!rorId) return null;
            return rorId.replace('https://ror.org/', '');
        }

        function render() {
            const q = searchEl.value.trim().toLowerCase();
            let filtered = labs;
            if (q) {
                filtered = labs.filter(l =>
                    (l.name && l.name.toLowerCase().includes(q)) ||
                    (l.acronym && l.acronym.toLowerCase().includes(q)) ||
                    (l.code && l.code.toLowerCase().includes(q))
                );
            }

            // Sort
            filtered.sort((a, b) => {
                let va, vb;
                if (sortCol === 'name') {
                    va = (a.name || '').toLowerCase();
                    vb = (b.name || '').toLowerCase();
                } else if (sortCol === 'tutelles') {
                    va = (a.tutelles || []).map(t => t.acronym || t.name).join(', ').toLowerCase();
                    vb = (b.tutelles || []).map(t => t.acronym || t.name).join(', ').toLowerCase();
                } else {
                    va = ''; vb = '';
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });

            countEl.textContent = filtered.length + ' laboratoire' + (filtered.length > 1 ? 's' : '');

            tbody.innerHTML = filtered.map(l => {
                const displayName = l.acronym
                    ? `<span class="lab-name">${esc(l.name)}</span><span class="lab-acronym">(${esc(l.acronym)})</span>`
                    : `<span class="lab-name">${esc(l.name)}</span>`;

                const tutelles = (l.tutelles || []).map(t =>
                    `<span class="tutelle-tag">${esc(t.acronym || t.name)}</span>`
                ).join('');

                const rorCol = l.ror_id
                    ? `<a href="${esc(l.ror_id)}" target="_blank" class="id-badge">${esc(rorShortId(l.ror_id))}</a>`
                    : '';

                const halCol = l.hal_collection
                    ? `<a href="https://hal.science/${esc(l.hal_collection)}" target="_blank" class="id-badge">${esc(l.hal_collection)}</a>`
                    : '';

                return `<tr>
                    <td>${displayName}</td>
                    <td><div class="tutelles">${tutelles}</div></td>
                    <td>${rorCol}</td>
                    <td>${halCol}</td>
                </tr>`;
            }).join('');

            // Update sort arrows
            document.querySelectorAll('thead th').forEach(th => {
                const arrow = th.querySelector('.sort-arrow');
                if (!arrow) return;
                if (th.dataset.col === sortCol) {
                    th.classList.add('sorted');
                    arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
                } else {
                    th.classList.remove('sorted');
                    arrow.textContent = '\u25B2';
                }
            });
        }

        // Sort click
        document.querySelectorAll('thead th[data-col]').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.col;
                if (!col) return; // not sortable
                if (sortCol === col) { sortAsc = !sortAsc; }
                else { sortCol = col; sortAsc = true; }
                render();
            });
        });

        searchEl.addEventListener('input', render);

        // Load data
        fetch('/api/laboratories')
            .then(r => r.json())
            .then(data => { labs = data; render(); });
    })();
    </script>
</body>
</html>
