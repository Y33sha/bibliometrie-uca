[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "bibliometrie-uca"
version = "0.1.0"
requires-python = ">=3.10"

[tool.setuptools]
py-modules = []

[tool.setuptools.packages.find]
include = ["backend*", "config*", "db*", "extraction*", "processing*", "services*", "utils*", "scripts*"]
