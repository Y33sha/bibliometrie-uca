[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "bibliometrie-uca"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "requests==2.33.0",          # CVE-2024-35195, CVE-2024-47081, CVE-2026-25645 fixed
    "httpx==0.27.2",             # extractions HTTP async dans le pipeline
    "psycopg[binary]==3.3.3",     # driver Postgres pour SQLAlchemy ; import symbolique dans infrastructure/db/engine.py
    "sqlalchemy==2.0.43",        # query builder Core (chantier sqlalchemy-core-adoption.md)
    "alembic==1.18.0",           # migrations DB (chantier alembic-adoption.md)
    "fastapi==0.128.2",
    "starlette==0.50.0",         # importÃĐ directement (Response, Scope, RequestResponseEndpoint) â ÃĐpinglÃĐ sur la version embarquÃĐe par fastapi
    "uvicorn==0.40.0",
    "bcrypt==5.0.0",
    "python-dotenv==1.2.2",      # requis par pydantic-settings pour env_file ; CVE-2026-28684 fixed
    "pydantic==2.12.5",          # requis par pydantic-settings et utilisÃĐ directement
    "pydantic-settings==2.13.1",
    "openpyxl==3.1.5",           # utilisÃĐ par interfaces/cli/import_persons.py
]

[project.optional-dependencies]
dev = [
    "pytest==9.0.3",                   # CVE-2025-71176 fixed
    "pytest-asyncio==1.3.0",           # tests async des endpoints FastAPI et adapters
    "pytest-cov==7.1.0",
    "respx==0.22.0",                   # mocking httpx pour tests async
    "ruff==0.15.11",
    "mypy==1.20.1",
    "types-requests==2.33.0.20260408",
    "deptry==0.25.1",
    "pip-audit==2.10.0",
    "pre-commit==4.4.0",
    "import-linter==2.11",
]

[tool.setuptools]
py-modules = []

[tool.setuptools.packages.find]
include = ["application*", "domain*", "infrastructure*", "interfaces*"]

# ----------------------------------------------------------------------
# deptry : dÃĐtection de dÃĐpendances manquantes / inutiles / transitives
# Lit [project.dependencies] (PEP 621) et [project.optional-dependencies.dev].
# ----------------------------------------------------------------------
[tool.deptry]
known_first_party = ["application", "domain", "infrastructure", "interfaces"]
extend_exclude = ["frontend", ".venv", "venv"]
# Le groupe `dev` de [project.optional-dependencies] est pour les outils
# de dev/test â deptry ne doit pas exiger qu'ils soient importÃĐs.
optional_dependencies_dev_groups = ["dev"]

# ----------------------------------------------------------------------
# import-linter : vÃĐrifie les rÃĻgles de dÃĐpendance entre couches DDD.
# Lancement : `lint-imports`
# ----------------------------------------------------------------------
[tool.importlinter]
root_packages = ["domain", "application", "infrastructure", "interfaces"]
# NÃĐcessaire pour les contrats `forbidden` qui ciblent des modules
# externes (cf. "Domain : pas de framework externe").
include_external_packages = true

[[tool.importlinter.contracts]]
name = "Couches DDD (layered)"
type = "layers"
layers = ["interfaces", "infrastructure | application", "domain"]
# `application` n'importe pas `infrastructure` : toute nouvelle
# dÃĐpendance doit passer par un port.
#
# Exception : `application.ports.*` est zone neutre (cf. rÃĻgle 2
# d'architecture.md). `infrastructure` peut en importer les
# dataclasses de transport pour typer ses signatures (cf. rÃĻgle 3).
# Les Protocols restent implÃĐmentÃĐs via duck typing.
#
ignore_imports = [
    "infrastructure.** -> application.ports.**",
]

[[tool.importlinter.contracts]]
name = "Routers : pas d'import direct de infrastructure"
type = "forbidden"
source_modules = ["interfaces.api.routers"]
forbidden_modules = ["infrastructure"]
# Les routers FastAPI pilotent des use-cases applicatifs et reÃ§oivent
# leurs dÃĐpendances via `Depends(...)` (factories dans
# `interfaces.api.async_deps`, composition root). La construction des
# adapters et l'accÃĻs direct Ã  l'infra (queries, repos, pool, engine)
# y sont interdits. Cf. rÃĻgle 4 de docs/architecture.md et chantier
# docs/chantiers/routers-di.md.
#
# Imports transitifs autorisÃĐs : `routers â async_deps â infrastructure`
# est le chemin attendu (composition root), donc on n'interdit que les
# imports directs.
allow_indirect_imports = "true"
ignore_imports = [
    # Hors pÃĐrimÃĻtre du chantier routers-di : status filesystem
    # (relu dans le futur chantier observabilitÃĐ pipeline) et chemin
    # projet (en attendant la refonte du mode d'affichage de la doc).
    # Ces 2 cas ne sont pas des queries / repos et ne dÃĐpendent pas
    # d'une connexion DB.
    "interfaces.api.routers.admin.pipeline_logs -> infrastructure.observability.pipeline_status",
    "interfaces.api.routers.docs -> infrastructure",
]

[[tool.importlinter.contracts]]
name = "Composition root : Pg* concrets uniquement dans app et deps"
type = "forbidden"
source_modules = ["interfaces.api"]
forbidden_modules = [
    "infrastructure.repositories",
    "infrastructure.queries",
]
# Verrouillage de la rÃĻgle 5 de docs/architecture.md : seul
# `interfaces/api/deps.py` instancie les `Pg*` concrets ; les routers
# et autres modules sous `interfaces.api/` passent par un port via
# `Depends(...)`.
ignore_imports = [
    "interfaces.api.deps -> infrastructure.repositories.**",
    "interfaces.api.deps -> infrastructure.queries.**",
]

[[tool.importlinter.contracts]]
name = "Domain : pas de framework externe"
type = "forbidden"
source_modules = ["domain"]
forbidden_modules = ["pydantic", "sqlalchemy", "fastapi", "starlette", "psycopg"]
# Le domaine ne dÃĐpend de rien : pas d'ORM, pas de validation
# Pydantic, pas de framework web, pas de driver DB. Les modÃĻles
# d'I/O JSONB (BaseModel) vivent dans infrastructure/jsonb_models/.
# Cf. docs/chantiers/CODE_purete-domain.md.

[tool.deptry.per_rule_ignores]
# python-dotenv n'est pas importÃĐ directement, mais pydantic-settings
# l'appelle en interne dÃĻs qu'on utilise `env_file=...`.
DEP002 = ["python-dotenv"]

# Alias paquet distribuÃĐ â nom de module importÃĐ (les noms peuvent diffÃĐrer).
[tool.deptry.package_module_name_map]
pydantic-settings = "pydantic_settings"

# ----------------------------------------------------------------------
# Ruff : linter + formateur (remplace flake8, isort, pyupgrade, black)
# Mode permissif au dÃĐbut â voir `ruff check .` et `ruff format --check .`
# ----------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "interfaces/frontend",
    "bibliometrie_uca.egg-info",
    ".venv",
    "venv",
    "build",
    "dist",
]

[tool.ruff.lint]
# RÃĻgles activÃĐes â on dÃĐmarre permissif, Ã  durcir au fil du temps.
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes (undefined names, unused imports, etc.)
    "I",      # isort (ordre des imports)
    "UP",     # pyupgrade (syntaxe obsolÃĻte)
    "B",      # flake8-bugbear (piÃĻges courants)
    "C901",   # complexitÃĐ cyclomatique
    "ASYNC",  # flake8-async : I/O bloquantes dans une async def, etc.
]
# RUF029 (async def sans await) serait utile mais reste en preview chez
# ruff Ã  ce jour : l'activer exigerait `preview = true` qui allume
# d'autres rÃĻgles preview non ÃĐvaluÃĐes. Ã ajouter quand elle stabilise.
# IgnorÃĐs le temps d'assainir progressivement
ignore = [
    "E501", # ligne trop longue â Ã  durcir plus tard
    "E402", # module-level import not at top â quelques cas lÃĐgitimes
    "B008", # function call in default argument â FastAPI Depends() idiomatique
]

[tool.ruff.lint.mccabe]
# Seuil Ã  15 aprÃĻs dÃĐcomposition de publications_facets (25 â <10),
# _build_list_conditions (17 â <15), refresh_from_sources (24 â <15),
# export_publications_csv (23 â <15). Prochaine cible : 10.
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"] # imports aprÃĻs setup de conftest
"interfaces/cli/*" = ["E402", "C901"] # scripts one-shot, complexitÃĐ tolÃĐrÃĐe
"application/pipeline/*" = [
    "C901",
] # normalisation par source, nombreuses branches mÃĐtier
"infrastructure/sources/*" = ["C901"] # idem pour les extracteurs
"interfaces/api/routers/*" = ["E402"] # imports tardifs frÃĐquents

# ----------------------------------------------------------------------
# Pytest + coverage
# ----------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
# pytest-asyncio mode auto â les fonctions `async def test_*` sont
# reconnues automatiquement sans dÃĐcorateur. Loop scope par fonction
# (dÃĐfaut) : chaque test async a sa propre boucle.
asyncio_mode = "auto"

[tool.coverage.run]
branch = true
source = ["application", "domain", "infrastructure", "interfaces"]
omit = [
    "tests/*",
    "*/__init__.py",
    # Scripts CLI one-shot : lancÃĐs Ã  la main, pas testÃĐs unitairement.
    # Leur logique mÃĐtier utile est factorisÃĐe dans application/ ou
    # infrastructure/ et testÃĐe lÃ .
    "interfaces/cli/*",
    # Debug scripts dans interfaces/cli/debug/
    "interfaces/cli/debug/*",
    # Wiring HTTP des adapters sources : pure functions de parsing
    # extraites dans `<source>/parsing.py` (couvert par tests unit) ;
    # ce qui reste = httpx + pagination + sleep + subclass
    # SourceExtractor. Faible ROI sur tests fixtures (cf.
    # docs/chantiers/CODE_couverture-tests.md).
    "infrastructure/sources/hal/extract_hal.py",
    "infrastructure/sources/hal/fetch_missing_hal_id.py",
    "infrastructure/sources/hal/fetch_missing_doi.py",
    "infrastructure/sources/openalex/extract_openalex.py",
    "infrastructure/sources/openalex/fetch_missing_doi.py",
    "infrastructure/sources/openalex/refetch_truncated.py",
    "infrastructure/sources/scanr/extract_scanr.py",
    "infrastructure/sources/scanr/fetch_missing_doi.py",
    "infrastructure/sources/theses/extract_theses.py",
    "infrastructure/sources/wos/extract_wos.py",
    "infrastructure/sources/wos/fetch_missing_doi.py",
    "infrastructure/sources/crossref/fetch_missing_doi.py",
]

[tool.coverage.report]
skip_empty = true
show_missing = true
# Seuil progressif : ne jamais rÃĐgresser. Ã faire remonter au fur et Ã 
# mesure qu'on ajoute des tests.
fail_under = 85
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

# ----------------------------------------------------------------------
# Mypy : type checker (mode permissif au dÃĐmarrage)
# Durcir module par module via overrides quand le code est stabilisÃĐ.
# ----------------------------------------------------------------------
[tool.mypy]
python_version = "3.10"
# Imports : ignorer les libs tierces non typÃĐes plutÃīt que de polluer
ignore_missing_imports = true
# Mode strict : toutes les fonctions doivent ÃŠtre annotÃĐes, et leur corps
# est vÃĐrifiÃĐ.
check_untyped_defs = true
disallow_untyped_defs = true
# `Any` explicite interdit globalement â aboutissement du chantier
# `CODE_chasse-aux-any`. Exceptions explicites via overrides ci-dessous,
# toutes documentÃĐes (frontiÃĻres JSON/JSONB en lecture, records DB
# hydratÃĐs, helpers polymorphiques, partial updates DB).
disallow_any_explicit = true
disallow_any_generics = true
# `-> Any` propagÃĐ tolÃĐrÃĐ pragmatiquement.
warn_return_any = false
# Afficher les codes d'erreur pour pouvoir ignorer prÃĐcisÃĐment au besoin
show_error_codes = true
# Ne pas imposer l'absence d'Optional implicite
implicit_optional = true
# Ignorer les erreurs dans les tests (focus sur le code de prod)
exclude = [
    "^tests/",
    "^frontend/",
    "^bibliometrie_uca\\.egg-info/",
    "^\\.venv/",
    "^build/",
    # Code Alembic : `op` et `context` sont ajoutÃĐs dynamiquement au
    # module `alembic` Ã  l'import, mypy ne les dÃĐtecte pas. CohÃĐrent
    # avec l'exclusion `tests/` : code framework, pas du mÃĐtier.
    "^alembic/",
]

# DÃĐsactivation explicite pour les modules dont les `Any` sont
# dÃĐlibÃĐrÃĐs. DocumentÃĐs au cas par cas :
# - `domain.sources.*`, `infrastructure.sources.*`, `infrastructure.jsonb_models.*` :
#   payloads JSON bruts d'APIs externes / colonnes JSONB libres.
# - `application.ports.api.*` : DTOs Pydantic co-localisÃĐs â `BaseModel`
#   propage `Any` via ses stubs (`__init__: **data: Any`), ce qui dÃĐclenche
#   `explicit-any` Ã  chaque hÃĐritage `class X(BaseModel)`. Le `Any` cÃītÃĐ
#   projet est strict (Phase 4 du chantier `CODE_typage-projections-strict`)
#   mais l'override couvre Pydantic. Idem pour `infrastructure.settings` qui
#   hÃĐrite de `BaseSettings`.
# - `application.ports.repositories.*` (sauf audit, dÃĐjÃ  strict) : records DB
#   hydratÃĐs et partial updates â dÃĐlÃĐguÃĐs au chantier `CODE_rich-domain-model`
#   Phase 8.
# - `application.ports.pipeline.{staging,subjects}` : `raw_data: dict[str, Any]`
#   JSONB sur `StagingRow`, `list[Any]` sur
#   `select_source_publications_with_subjects`.
# - `domain.publications.aggregation` : `first_non_null` /
#   `merge_lists_dedup_ci` polymorphiques sur `getattr(source, attr)`.
# - `application.pipeline.normalize.*` (hors port `normalize.wos`, dÃĐjÃ  strict) :
#   consomment des payloads `dict[str, Any]` venant des APIs externes (cf.
#   `domain.sources.*`).
# - `application.pipeline.publications.match_or_create_publications` :
#   `external_ids` JSONB + `doc: dict[str, Any]` payload source.
# - `application.pipeline.subjects._common` : `_PushedOntology` interne au
#   cache (dict mutable avec sets, difficile Ã  typer).
# - Services racine `application.{persons,structures}` : `list` / `dict` sans
#   paramÃĻtres (records DB hydratÃĐs) â dÃĐlÃĐguÃĐs Ã  Phase 8 (`CODE_rich-domain-model`).
# - `infrastructure.repositories.*` et `infrastructure.queries.*` :
#   couche SQL â Row, records DB, batchs hÃĐtÃĐrogÃĻnes. Phase 8.
# - `interfaces.cli.{imports,maintenance}.*` : scripts one-shot, hors scope.
# - `interfaces.api.models:ConfigItem.value` / `ConfigValueUpdate.value` :
#   pydantic ne supporte pas l'alias rÃĐcursif `JsonValue` (py310).
# - `interfaces.cli.dev.generate_seed.TABLES` : schÃĐma de seed,
#   `list[dict[str, Any]]` dÃĐlibÃĐrÃĐ.
# - `run_pipeline` : entry-point CLI qui orchestre des subprocess + dict
#   d'options hÃĐtÃĐrogÃĻnes â hors scope du chantier typage.
[[tool.mypy.overrides]]
module = [
    "application.persons",
    "application.structures",
    "application.pipeline.enrich.*",
    "application.pipeline.fetch_missing_doi",
    "application.pipeline.normalize.*",
    "application.pipeline.publications.match_or_create_publications",
    "application.pipeline.subjects._common",
    "application.ports.api.*",
    "application.ports.pipeline.staging",
    "application.ports.pipeline.subjects",
    "application.ports.repositories.*",
    "domain.publications.aggregation",
    "domain.sources.*",
    "infrastructure.jsonb_models.*",
    "infrastructure.queries.*",
    "infrastructure.repositories.*",
    "infrastructure.settings",
    "infrastructure.sources.*",
    "interfaces.api.app",
    "interfaces.api.models.*",
    "interfaces.api.routers.docs",
    "interfaces.cli.dev.generate_seed",
    "interfaces.cli.imports.*",
    "interfaces.cli.maintenance.*",
    "run_pipeline",
]
disallow_any_explicit = false
disallow_any_generics = false
